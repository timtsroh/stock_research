name: dart 전자공시피드

on:
  schedule:
    - cron: '1 15 * * *'   # KST 00:01 (UTC 15:01 전날)
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  run-feed:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r dart/requirements.txt

      - name: DART 공시피드 실행
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_OAUTH_KEYS }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_DART_ID_Light: ${{ secrets.TELEGRAM_DART_ID_LIGHT }}
          TELEGRAM_DART_ID_Atom: ${{ secrets.TELEGRAM_DART_ID_ATOM }}
        run: python dart/main.py
