name: news_kor 뉴스피드

on:
  schedule:
    - cron: '0 21 * * *'   # KST 06:00 (UTC 21:00 전날)
    - cron: '0 9 * * *'    # KST 18:00 (UTC 09:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  run-feed:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r news_kor/requirements.txt

      - name: GCP 키 파일 복원
        run: echo '${{ secrets.GCP_OAUTH_KEYS }}' > news_kor/gcp-oauth.keys2.json

      - name: 뉴스피드 실행
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_Light: ${{ secrets.TELEGRAM_CHAT_ID_LIGHT }}
          TELEGRAM_CHAT_ID_Atom: ${{ secrets.TELEGRAM_CHAT_ID_ATOM }}
        run: python news_kor/main.py
