name: Korean Stock News Feed

on:
  schedule:
    - cron: "0 21 * * *"   # KST 06:00 (UTC 21:00 전날)
    - cron: "0 9 * * *"    # KST 18:00 (UTC 09:00)
  workflow_dispatch:         # 수동 트리거 (테스트용)

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r news_kor/requirements.txt

      - name: Run news feed
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID_Light: ${{ secrets.TELEGRAM_CHAT_ID_Light }}
          TELEGRAM_CHAT_ID_Atom: ${{ secrets.TELEGRAM_CHAT_ID_Atom }}
        run: python news_kor/main.py
